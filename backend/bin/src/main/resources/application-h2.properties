# H2 in-memory profile for local development / testing
spring.datasource.url=jdbc:h2:mem:atsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialise seed data after schema is created
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-h2.sql
spring.jpa.defer-datasource-initialization=true

# JWT (dummy values for local)
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000
jwt.secret-key=h2-local-secret-key-minimum-256-bits-long-this-is-ok

# Disable mail for local
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Dummy frontend URL
app.frontend-url=http://localhost:5173
app.mail.from=no-reply@ats.local

server.port=8080
