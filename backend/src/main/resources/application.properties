spring.application.name=ats
spring.profiles.active=mysql

server.port=${SERVER_PORT:8085}

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ats?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect is auto-detected from datasource

# JWT Secret
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000
jwt.secret-key=${JWT_SECRET_KEY:ats-default-secret-key-must-be-very-long-to-be-secure-and-at-least-512-bits}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:test}
spring.mail.password=${MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL used in email links
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# Sender name shown in emails
app.mail.from=${MAIL_FROM:no-reply@ats.local}