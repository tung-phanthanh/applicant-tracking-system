<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise ATS - Dashboard</title>
    <link href="./dist/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans text-slate-900">
    <div id="app" data-title="Dashboard">
        <div class="grid grid-cols-1 gap-4 md:gap-8 md:grid-cols-3 mb-8">
            <!-- Stats Card 1 -->
            <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Active Jobs</p>
                        <p class="text-3xl font-bold text-slate-900 mt-1">12</p>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-full text-blue-600">
                        <i data-lucide="briefcase"></i>
                    </div>
                </div>
            </div>
            <!-- Stats Card 2 -->
            <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">New Candidates</p>
                        <p class="text-3xl font-bold text-slate-900 mt-1">48</p>
                    </div>
                    <div class="p-3 bg-green-50 rounded-full text-green-600">
                        <i data-lucide="users"></i>
                    </div>
                </div>
            </div>
            <!-- Stats Card 3 -->
            <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Interviews Today</p>
                        <p class="text-3xl font-bold text-slate-900 mt-1">5</p>
                    </div>
                    <div class="p-3 bg-purple-50 rounded-full text-purple-600">
                        <i data-lucide="calendar"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Recent Applications</h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                        <div class="flex items-center">
                            <div
                                class="h-10 w-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 font-bold text-sm">
                                JS</div>
                            <div class="ml-3">
                                <p class="text-sm font-medium text-slate-900">John Smith</p>
                                <p class="text-xs text-slate-500">Applied for Senior Backend Engineer</p>
                            </div>
                        </div>
                        <span
                            class="inline-flex items-center rounded-md bg-yellow-50 px-2 py-1 text-xs font-medium text-yellow-800 ring-1 ring-inset ring-yellow-600/20">Review</span>
                    </div>
                    <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                        <div class="flex items-center">
                            <div
                                class="h-10 w-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 font-bold text-sm">
                                AL</div>
                            <div class="ml-3">
                                <p class="text-sm font-medium text-slate-900">Alice Lee</p>
                                <p class="text-xs text-slate-500">Applied for Product Designer</p>
                            </div>
                        </div>
                        <span
                            class="inline-flex items-center rounded-md bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10">Screening</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Today's Interviews</h3>
                <div class="flex items-center justify-center h-48 text-gray-400 text-sm">
                    <div class="text-center">
                        <i data-lucide="calendar-off" class="w-10 h-10 mx-auto mb-2 opacity-30"></i>
                        No remaining interviews today
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/js/layout.js"></script>
</body>

</html>
