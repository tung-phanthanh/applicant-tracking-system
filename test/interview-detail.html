<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Detail - Enterprise ATS</title>
    <link href="./dist/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans text-slate-900">
    <div id="app" data-title="Interview Details">
        <div class="max-w-4xl mx-auto space-y-6">
            <!-- Header Card -->
            <div class="bg-white shadow rounded-lg p-6">
                <div class="md:flex md:justify-between md:items-start">
                    <div>
                        <h3 class="text-xl font-bold leading-6 text-gray-900">Technical Interview: Sarah Jenkins</h3>
                        <p class="mt-1 text-sm text-gray-500">Senior Frontend Developer &bull; Engineering</p>
                        <div class="mt-4 flex items-center space-x-4 text-sm text-gray-700">
                            <div class="flex items-center">
                                <i data-lucide="calendar" class="w-4 h-4 mr-1 text-gray-400"></i>
                                Tue, Oct 17, 2023
                            </div>
                            <div class="flex items-center">
                                <i data-lucide="clock" class="w-4 h-4 mr-1 text-gray-400"></i>
                                10:00 AM - 11:00 AM
                            </div>
                            <div class="flex items-center">
                                <i data-lucide="video" class="w-4 h-4 mr-1 text-gray-400"></i>
                                <a href="#" class="text-blue-600 hover:underline">Google Meet</a>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 md:mt-0 flex space-x-2">
                        <button type="button"
                            class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
                            Reschedule
                        </button>
                        <button type="button"
                            class="rounded-md bg-red-50 px-3 py-2 text-sm font-semibold text-red-600 shadow-sm ring-1 ring-inset ring-red-300 hover:bg-red-100">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Left: Candidate & Participants -->
                <div class="md:col-span-1 space-y-6">
                    <div class="bg-white shadow rounded-lg p-6">
                        <h4 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-4">Candidate</h4>
                        <div class="flex items-center">
                            <div
                                class="h-10 w-10 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 font-bold">
                                SJ</div>
                            <div class="ml-3">
                                <p class="text-sm font-medium text-gray-900">Sarah Jenkins</p>
                                <a href="candidate-detail.html" class="text-xs text-blue-600 hover:underline">View
                                    Profile</a>
                            </div>
                        </div>
                        <div class="mt-4">
                            <a href="#" class="flex items-center p-2 rounded hover:bg-gray-50 border border-gray-200">
                                <i data-lucide="file-text" class="w-5 h-5 text-red-500 mr-2"></i>
                                <div class="overflow-hidden">
                                    <p class="text-xs font-medium text-gray-900 truncate">resume.pdf</p>
                                </div>
                            </a>
                        </div>
                    </div>

                    <div class="bg-white shadow rounded-lg p-6">
                        <h4 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-4">Interviewers</h4>
                        <ul class="space-y-3">
                            <li class="flex items-center">
                                <span
                                    class="h-8 w-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600">JD</span>
                                <span class="ml-3 text-sm text-gray-900">John Doe (Organizer)</span>
                            </li>
                            <li class="flex items-center">
                                <span
                                    class="h-8 w-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600">MR</span>
                                <span class="ml-3 text-sm text-gray-900">Mike Ross</span>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Right: Scorecard / Feedback -->
                <div class="md:col-span-2">
                    <div class="bg-white shadow rounded-lg p-6">
                        <h4 class="text-lg font-bold mb-4">Interview Feedback</h4>
                        <form class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Recommendation</label>
                                <div class="mt-2 flex space-x-4">
                                    <label class="flex items-center">
                                        <input type="radio" name="recommendation"
                                            class="h-4 w-4 border-gray-300 text-green-600 focus:ring-green-600">
                                        <span class="ml-2 text-sm font-medium text-gray-900">Strong Yes</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="radio" name="recommendation"
                                            class="h-4 w-4 border-gray-300 text-blue-600 focus:ring-blue-600">
                                        <span class="ml-2 text-sm font-medium text-gray-900">Yes</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="radio" name="recommendation"
                                            class="h-4 w-4 border-gray-300 text-yellow-600 focus:ring-yellow-600">
                                        <span class="ml-2 text-sm font-medium text-gray-900">Unsure</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="radio" name="recommendation"
                                            class="h-4 w-4 border-gray-300 text-red-600 focus:ring-red-600">
                                        <span class="ml-2 text-sm font-medium text-gray-900">No</span>
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Technical Skills
                                    (1-5)</label>
                                <div class="flex space-x-6">
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-tech" value="1" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            1</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-tech" value="2" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            2</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-tech" value="3" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            3</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-tech" value="4" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            4</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-tech" value="5" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            5</div>
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Communication (1-5)</label>
                                <div class="flex space-x-6">
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-comm" value="1" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            1</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-comm" value="2" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            2</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-comm" value="3" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            3</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-comm" value="4" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            4</div>
                                    </label>
                                    <label class="flex flex-col items-center cursor-pointer group">
                                        <input type="radio" name="rating-comm" value="5" class="sr-only peer">
                                        <div
                                            class="w-8 h-8 rounded-full border border-gray-300 peer-checked:bg-slate-900 peer-checked:text-white flex items-center justify-center hover:bg-gray-50">
                                            5</div>
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label for="notes" class="block text-sm font-medium text-gray-700">Detailed
                                    Notes</label>
                                <div class="mt-1">
                                    <textarea id="notes" name="notes" rows="4"
                                        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm p-2 border"
                                        placeholder="Strengths, weaknesses, key takeaways..."></textarea>
                                </div>
                            </div>

                            <div class="flex justify-end pt-4">
                                <button type="submit"
                                    class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2">
                                    Submit Feedback
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/js/layout.js"></script>
</body>

</html>
