<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview - Enterprise ATS</title>
    <link href="./dist/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans text-slate-900">
    <div id="app" data-title="Schedule Interview">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white shadow sm:rounded-lg">
                <div class="px-4 py-5 sm:p-6">
                    <h3 class="text-lg font-medium leading-6 text-gray-900">Schedule Interview</h3>
                    <div class="mt-2 max-w-xl text-sm text-gray-500">
                        <p>Set up an interview with Sarah Jenkins for the Senior Frontend Developer role.</p>
                    </div>

                    <form class="mt-5 space-y-6">
                        <!-- Candidate Info (Read-only) -->
                        <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                            <div class="sm:col-span-3">
                                <label class="block text-sm font-medium text-gray-700">Candidate</label>
                                <div
                                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm p-2 bg-gray-50 border text-gray-500">
                                    Sarah Jenkins
                                </div>
                            </div>
                            <div class="sm:col-span-3">
                                <label class="block text-sm font-medium text-gray-700">Interview Type</label>
                                <div class="mt-1">
                                    <select
                                        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm p-2 bg-white border">
                                        <option>Screening Call (30m)</option>
                                        <option selected>Technical Interview (60m)</option>
                                        <option>Culture Fit (45m)</option>
                                        <option>On-site (4h)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Date & Time -->
                        <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                            <div class="sm:col-span-3">
                                <label for="date" class="block text-sm font-medium text-gray-700">Date</label>
                                <div class="mt-1">
                                    <input type="date" name="date" id="date"
                                        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm p-2 border">
                                </div>
                            </div>

                            <div class="sm:col-span-3">
                                <label for="time" class="block text-sm font-medium text-gray-700">Time</label>
                                <div class="mt-1">
                                    <input type="time" name="time" id="time"
                                        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm p-2 border">
                                </div>
                            </div>
                        </div>

                        <!-- Interviewers -->
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Interviewers</label>
                            <div class="mt-2 space-y-2">
                                <div class="flex items-center space-x-2">
                                    <span
                                        class="inline-flex items-center rounded-full bg-slate-100 px-3 py-0.5 text-sm font-medium text-slate-800">
                                        John Doe (You)
                                    </span>
                                    <button type="button" class="text-sm text-blue-600 hover:text-blue-500 font-medium">
                                        + Add Interviewer
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Conflict Warning (Mock) -->
                        <div class="rounded-md bg-yellow-50 p-4 border border-yellow-200">
                            <div class="flex">
                                <div class="flex-shrink-0">
                                    <i data-lucide="alert-triangle" class="h-5 w-5 text-yellow-400"></i>
                                </div>
                                <div class="ml-3">
                                    <h3 class="text-sm font-medium text-yellow-800">Potential Conflict</h3>
                                    <div class="mt-2 text-sm text-yellow-700">
                                        <p>John Doe has another meeting scheduled at this time.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Location / Link -->
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Location / Meeting Link</label>
                            <div class="mt-1 flex rounded-md shadow-sm">
                                <span
                                    class="inline-flex items-center rounded-l-md border border-r-0 border-gray-300 bg-gray-50 px-3 text-gray-500 sm:text-sm">
                                    <i data-lucide="video" class="w-4 h-4"></i>
                                </span>
                                <input type="text" name="location" id="location"
                                    class="block w-full min-w-0 flex-1 rounded-none rounded-r-md border-gray-300 focus:border-slate-500 focus:ring-slate-500 sm:text-sm p-2 border"
                                    placeholder="https://meet.google.com/..."
                                    value="https://meet.google.com/abc-defg-hij">
                            </div>
                            <div class="mt-2 flex items-center">
                                <input id="generate-link" name="generate-link" type="checkbox"
                                    class="h-4 w-4 rounded border-gray-300 text-slate-600 focus:ring-slate-600" checked>
                                <label for="generate-link" class="ml-2 block text-sm text-gray-900">Auto-generate Google
                                    Meet link</label>
                            </div>
                        </div>

                        <div class="pt-5 flex justify-end">
                            <button type="button"
                                class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2">Cancel</button>
                            <button type="button" onclick="window.location.href='interview-detail.html'"
                                class="ml-3 inline-flex justify-center rounded-md border border-transparent bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2">Schedule</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/js/layout.js"></script>
</body>

</html>
