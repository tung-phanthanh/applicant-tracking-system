<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Pipeline - Enterprise ATS</title>
    <link href="./dist/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .kanban-col {
            min-height: 500px;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-slate-900">
    <div id="app" data-title="Candidate Pipeline">
        <div class="h-full flex flex-col">
            <!-- Toolbar -->
            <div class="sticky top-0 z-10 bg-gray-50 pt-2 pb-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="relative rounded-md shadow-sm w-64">
                            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                                <i data-lucide="search" class="h-4 w-4 text-gray-400"></i>
                            </div>
                            <input type="text" name="search" id="search"
                                class="block w-full rounded-md border-0 py-1.5 pl-10 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-slate-600 sm:text-sm sm:leading-6"
                                placeholder="Search candidates...">
                        </div>
                        <select
                            class="block rounded-md border-0 py-1.5 pl-3 pr-10 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-slate-600 sm:text-sm sm:leading-6">
                            <option>All Jobs</option>
                            <option>Senior Frontend Developer</option>
                            <option>Product Designer</option>
                        </select>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="inline-flex rounded-md shadow-sm" role="group">
                            <button type="button"
                                class="px-4 py-2 text-sm font-medium text-slate-900 bg-white border border-gray-200 rounded-l-lg hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-2 focus:ring-blue-700 focus:text-blue-700">
                                <i data-lucide="kanban" class="w-4 h-4"></i>
                            </button>
                            <button type="button" onclick="window.location.href='candidates-list.html'"
                                class="px-4 py-2 text-sm font-medium text-gray-900 bg-white border border-gray-200 rounded-r-lg hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-2 focus:ring-blue-700 focus:text-blue-700">
                                <i data-lucide="list" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <button type="button"
                            class="rounded-md bg-slate-900 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800">
                            <i data-lucide="plus" class="inline w-4 h-4 mr-1"></i> Add Candidate
                        </button>
                    </div>
                </div>
            </div>

            <!-- Kanban Board -->
            <div class="flex-1 overflow-x-auto overflow-y-hidden">
                <div class="inline-flex h-full space-x-4 pb-4">
                    <!-- Column: Applied -->
                    <div class="w-80 flex-shrink-0 flex flex-col bg-gray-100 rounded-lg">
                        <div
                            class="p-3 font-semibold text-sm text-gray-700 flex justify-between items-center border-b border-gray-200">
                            <span>Applied</span>
                            <span class="bg-gray-200 text-gray-600 py-0.5 px-2 rounded-full text-xs">5</span>
                        </div>
                        <div class="flex-1 p-2 space-y-2 overflow-y-auto kanban-col" ondrop="drop(event)"
                            ondragover="allowDrop(event)">
                            <!-- Card 1 -->
                            <div class="bg-white p-3 rounded shadow-sm border border-gray-200 cursor-move hover:shadow-md"
                                draggable="true" ondragstart="drag(event)" id="cand-1"
                                onclick="window.location.href='candidate-detail.html'">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-semibold text-sm text-gray-900">Sarah Jenkins</h4>
                                    <span class="text-xs text-gray-400">2h</span>
                                </div>
                                <p class="text-xs text-gray-500 mb-2">Senior Frontend Developer</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex -space-x-1">
                                        <div
                                            class="h-6 w-6 rounded-full bg-pink-100 flex items-center justify-center text-xs font-bold text-pink-600 ring-2 ring-white">
                                            SJ</div>
                                    </div>
                                    <div class="flex space-x-1">
                                        <span
                                            class="inline-flex items-center rounded-sm bg-blue-50 px-1.5 py-0.5 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10">4.5</span>
                                    </div>
                                </div>
                            </div>
                            <!-- Card 2 -->
                            <div class="bg-white p-3 rounded shadow-sm border border-gray-200 cursor-move hover:shadow-md"
                                draggable="true" ondragstart="drag(event)" id="cand-2"
                                onclick="window.location.href='candidate-detail.html'">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-semibold text-sm text-gray-900">Mike Ross</h4>
                                    <span class="text-xs text-gray-400">1d</span>
                                </div>
                                <p class="text-xs text-gray-500 mb-2">Product Designer</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex -space-x-1">
                                        <div
                                            class="h-6 w-6 rounded-full bg-blue-100 flex items-center justify-center text-xs font-bold text-blue-600 ring-2 ring-white">
                                            MR</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Column: Screening -->
                    <div class="w-80 flex-shrink-0 flex flex-col bg-gray-100 rounded-lg">
                        <div
                            class="p-3 font-semibold text-sm text-gray-700 flex justify-between items-center border-b border-gray-200">
                            <span>Screening</span>
                            <span class="bg-gray-200 text-gray-600 py-0.5 px-2 rounded-full text-xs">2</span>
                        </div>
                        <div class="flex-1 p-2 space-y-2 overflow-y-auto kanban-col" ondrop="drop(event)"
                            ondragover="allowDrop(event)">
                            <!-- Card 3 -->
                            <div class="bg-white p-3 rounded shadow-sm border border-gray-200 cursor-move hover:shadow-md"
                                draggable="true" ondragstart="drag(event)" id="cand-3"
                                onclick="window.location.href='candidate-detail.html'">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-semibold text-sm text-gray-900">John Smith</h4>
                                    <span class="text-xs text-gray-400">2d</span>
                                </div>
                                <p class="text-xs text-gray-500 mb-2">Senior Frontend Developer</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex -space-x-1">
                                        <div
                                            class="h-6 w-6 rounded-full bg-green-100 flex items-center justify-center text-xs font-bold text-green-600 ring-2 ring-white">
                                            JS</div>
                                    </div>
                                    <div class="flex space-x-1">
                                        <i data-lucide="message-square" class="w-3 h-3 text-gray-400"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Column: Interview -->
                    <div class="w-80 flex-shrink-0 flex flex-col bg-gray-100 rounded-lg">
                        <div
                            class="p-3 font-semibold text-sm text-gray-700 flex justify-between items-center border-b border-gray-200">
                            <span>Interview</span>
                            <span class="bg-gray-200 text-gray-600 py-0.5 px-2 rounded-full text-xs">3</span>
                        </div>
                        <div class="flex-1 p-2 space-y-2 overflow-y-auto kanban-col" ondrop="drop(event)"
                            ondragover="allowDrop(event)">
                            <div class="bg-white p-3 rounded shadow-sm border border-gray-200 cursor-move hover:shadow-md"
                                draggable="true" ondragstart="drag(event)" id="cand-4"
                                onclick="window.location.href='candidate-detail.html'">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-semibold text-sm text-gray-900">Alice Lee</h4>
                                    <span class="text-xs text-gray-400">5d</span>
                                </div>
                                <p class="text-xs text-gray-500 mb-2">Senior Frontend Developer</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex -space-x-1">
                                        <div
                                            class="h-6 w-6 rounded-full bg-purple-100 flex items-center justify-center text-xs font-bold text-purple-600 ring-2 ring-white">
                                            AL</div>
                                    </div>
                                    <span
                                        class="inline-flex items-center rounded-sm bg-yellow-50 px-1.5 py-0.5 text-xs font-medium text-yellow-800 ring-1 ring-inset ring-yellow-600/20">Scheduled</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Column: Offer -->
                    <div class="w-80 flex-shrink-0 flex flex-col bg-gray-100 rounded-lg">
                        <div
                            class="p-3 font-semibold text-sm text-gray-700 flex justify-between items-center border-b border-gray-200">
                            <span>Offer</span>
                            <span class="bg-gray-200 text-gray-600 py-0.5 px-2 rounded-full text-xs">1</span>
                        </div>
                        <div class="flex-1 p-2 space-y-2 overflow-y-auto kanban-col" ondrop="drop(event)"
                            ondragover="allowDrop(event)">
                            <div class="bg-white p-3 rounded shadow-sm border border-gray-200 cursor-move hover:shadow-md border-l-4 border-l-green-500"
                                draggable="true" ondragstart="drag(event)" id="cand-5"
                                onclick="window.location.href='candidate-detail.html'">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-semibold text-sm text-gray-900">David Kim</h4>
                                    <span class="text-xs text-gray-400">1w</span>
                                </div>
                                <p class="text-xs text-gray-500 mb-2">Product Manager</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex -space-x-1">
                                        <div
                                            class="h-6 w-6 rounded-full bg-orange-100 flex items-center justify-center text-xs font-bold text-orange-600 ring-2 ring-white">
                                            DK</div>
                                    </div>
                                    <span
                                        class="inline-flex items-center rounded-sm bg-green-50 px-1.5 py-0.5 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">Pending</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/js/layout.js"></script>
    <script>
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('opacity-50');
        }

        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            var draggedElement = document.getElementById(data);
            draggedElement.classList.remove('opacity-50');

            // Find the closest drop zone (kanban-col)
            var dropZone = ev.target.closest('.kanban-col');
            if (dropZone) {
                dropZone.appendChild(draggedElement);
            }
        }

        // Reset opacity on drag end if dropped outside
        document.addEventListener('dragend', function (event) {
            event.target.classList.remove('opacity-50');
        });
    </script>
</body>

</html>
