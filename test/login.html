<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise ATS - Login</title>
    <link href="./dist/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans text-slate-900 h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 space-y-8 bg-white rounded-lg shadow-lg">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 bg-slate-900 text-white rounded-full flex items-center justify-center">
                <i data-lucide="briefcase" class="w-6 h-6"></i>
            </div>
            <h2 class="mt-6 text-3xl font-bold tracking-tight text-slate-900">
                Sign in to your account
            </h2>
            <p class="mt-2 text-sm text-slate-600">
                Or <a href="#" class="font-medium text-blue-600 hover:text-blue-500">start your 14-day free trial</a>
            </p>
        </div>
        <form class="mt-8 space-y-6" action="#" method="POST" id="loginForm">
            <input type="hidden" name="remember" value="true">
            <div class="-space-y-px rounded-md shadow-sm">
                <div>
                    <label for="email-address" class="sr-only">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required
                        class="relative block w-full rounded-t-md border-0 py-1.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:z-10 focus:ring-2 focus:ring-inset focus:ring-slate-600 sm:text-sm sm:leading-6 px-3"
                        placeholder="Email address">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="relative block w-full rounded-b-md border-0 py-1.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:z-10 focus:ring-2 focus:ring-inset focus:ring-slate-600 sm:text-sm sm:leading-6 px-3"
                        placeholder="Password">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 rounded border-gray-300 text-slate-600 focus:ring-slate-600">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-slate-600 hover:text-slate-500">Forgot your password?</a>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative flex w-full justify-center rounded-md bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-600 transition-all duration-200">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i data-lucide="lock" class="h-5 w-5 text-slate-500 group-hover:text-slate-400"></i>
                    </span>
                    Sign in
                    <span id="loading-spinner"
                        class="hidden ml-2 w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></span>
                </button>
            </div>

            <!-- Error Message Mock -->
            <div id="error-message" class="hidden rounded-md bg-red-50 p-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i data-lucide="x-circle" class="h-5 w-5 text-red-400"></i>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">Invalid credentials</h3>
                        <div class="mt-2 text-sm text-red-700">
                            <p>Please check your email and password and try again.</p>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const spinner = document.getElementById('loading-spinner');
            const errorMsg = document.getElementById('error-message');

            // Simulate loading
            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            setTimeout(() => {
                btn.disabled = false;
                spinner.classList.add('hidden');
                // Simulate error for demo
                // errorMsg.classList.remove('hidden');
                // Simulate success
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>

</html>
