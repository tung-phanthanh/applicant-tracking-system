<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Enterprise ATS</title>
    <link href="./dist/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans text-slate-900">
    <div id="app" data-title="Departments">
        <div class="px-4 sm:px-6 lg:px-8">
            <div class="sm:flex sm:items-center">
                <div class="sm:flex-auto">
                    <h1 class="text-base font-semibold leading-6 text-gray-900">Departments</h1>
                    <p class="mt-2 text-sm text-gray-700">Manage company departments and their heads.</p>
                </div>
                <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
                    <button type="button"
                        class="block rounded-md bg-slate-900 px-3 py-2 text-center text-sm font-semibold text-white shadow-sm hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Add
                        Department</button>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <!-- Engineering -->
                <div
                    class="relative flex flex-col rounded-lg border border-gray-300 bg-white p-6 shadow-sm hover:border-gray-400">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-medium text-gray-900">Engineering</h3>
                        <span
                            class="inline-flex items-center rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-medium text-blue-800">12
                            Members</span>
                    </div>
                    <div class="flex items-center mb-4">
                        <div
                            class="h-8 w-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600 mr-3">
                            AS</div>
                        <div>
                            <p class="text-sm font-medium text-gray-900">Alice Smith</p>
                            <p class="text-xs text-gray-500">Department Head</p>
                        </div>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-end space-x-2">
                        <button type="button" class="text-gray-400 hover:text-gray-500"><i data-lucide="edit-2"
                                class="w-4 h-4"></i></button>
                        <button type="button" class="text-red-400 hover:text-red-500"><i data-lucide="trash-2"
                                class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- Product -->
                <div
                    class="relative flex flex-col rounded-lg border border-gray-300 bg-white p-6 shadow-sm hover:border-gray-400">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-medium text-gray-900">Product</h3>
                        <span
                            class="inline-flex items-center rounded-full bg-purple-100 px-2.5 py-0.5 text-xs font-medium text-purple-800">5
                            Members</span>
                    </div>
                    <div class="flex items-center mb-4">
                        <div
                            class="h-8 w-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600 mr-3">
                            MR</div>
                        <div>
                            <p class="text-sm font-medium text-gray-900">Mike Ross</p>
                            <p class="text-xs text-gray-500">Department Head</p>
                        </div>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-end space-x-2">
                        <button type="button" class="text-gray-400 hover:text-gray-500"><i data-lucide="edit-2"
                                class="w-4 h-4"></i></button>
                        <button type="button" class="text-red-400 hover:text-red-500"><i data-lucide="trash-2"
                                class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- HR -->
                <div
                    class="relative flex flex-col rounded-lg border border-gray-300 bg-white p-6 shadow-sm hover:border-gray-400">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-medium text-gray-900">Human Resources</h3>
                        <span
                            class="inline-flex items-center rounded-full bg-green-100 px-2.5 py-0.5 text-xs font-medium text-green-800">3
                            Members</span>
                    </div>
                    <div class="flex items-center mb-4">
                        <div
                            class="h-8 w-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600 mr-3">
                            JD</div>
                        <div>
                            <p class="text-sm font-medium text-gray-900">John Doe</p>
                            <p class="text-xs text-gray-500">Department Head</p>
                        </div>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-end space-x-2">
                        <button type="button" class="text-gray-400 hover:text-gray-500"><i data-lucide="edit-2"
                                class="w-4 h-4"></i></button>
                        <button type="button" class="text-red-400 hover:text-red-500"><i data-lucide="trash-2"
                                class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/js/layout.js"></script>
</body>

</html>
